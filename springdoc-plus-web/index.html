<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Docs · SpringDoc Plus</title>

  <!--
    swagger-ui.css 路径说明：
    - Spring Boot 生产环境：由 webjars 提供，路径为 /webjars/swagger-ui-dist/swagger-ui.css
    - Vite dev 环境：由 vite.config.ts 的 proxy 将 /webjars 代理到本地 Spring Boot，路径相同
    两者路径一致，无需任何区分处理。
  -->
  <link rel="stylesheet" href="/webjars/swagger-ui-dist/swagger-ui.css" />

  <style>
    /* ════════════════════════════════════════════════
       Design Tokens
    ════════════════════════════════════════════════ */
    :root {
      --c-bg:            #f4f6f9;
      --c-surface:       #ffffff;
      --c-border:        #e4e8ef;
      --c-text:          #111827;
      --c-muted:         #6b7280;
      --c-primary:       #2563eb;
      --c-primary-hover: #1d4ed8;
      --c-primary-light: #eff6ff;
      --c-danger:        #ef4444;
      --c-success:       #22c55e;
      --c-warning:       #f59e0b;
      --sidebar-w:       256px;
      --topbar-h:        52px;
      --radius:          10px;
      --font-sans:       'Inter', 'PingFang SC', 'Hiragino Sans GB', system-ui, -apple-system, sans-serif;
      --font-mono:       'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      --shadow-modal:    0 24px 64px rgba(0,0,0,.16), 0 0 0 1px rgba(0,0,0,.06);
    }

    /* ════════════════════════════════════════════════
       Reset & Base
    ════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-sans);
      background: var(--c-bg);
      color: var(--c-text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    /* ════════════════════════════════════════════════
       App Shell
    ════════════════════════════════════════════════ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ════════════════════════════════════════════════
       Topbar
    ════════════════════════════════════════════════ */
    .topbar {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-bottom: 1px solid var(--c-border);
      background: var(--c-surface);
      flex-shrink: 0;
      z-index: 50;
    }
    .topbar-left  { display: flex; align-items: center; gap: 10px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

    .sidebar-toggle {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; border: none;
      background: transparent; color: var(--c-muted);
      cursor: pointer; transition: background .15s, color .15s; flex-shrink: 0;
    }
    .sidebar-toggle:hover { background: var(--c-border); color: var(--c-text); }
    .sidebar-toggle svg { width: 16px; height: 16px; }

    .brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .brand-icon {
      width: 28px; height: 28px; background: var(--c-primary); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0;
    }
    .brand-icon svg { width: 14px; height: 14px; }
    .brand-name { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; color: var(--c-text); }
    .brand-name em { font-style: normal; color: var(--c-primary); }

    .topbar-divider { width: 1px; height: 20px; background: var(--c-border); flex-shrink: 0; }

    .current-group {
      display: none; /* JS 设为 flex */
      align-items: center; gap: 6px;
      font-size: 13px; color: var(--c-muted);
      max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tag-dot {
      width: 6px; height: 6px; min-width: 6px;
      background: var(--c-success); border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(34,197,94,.2);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 2px rgba(34,197,94,.2); }
      50%      { box-shadow: 0 0 0 4px rgba(34,197,94,.1); }
    }

    .action-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid var(--c-border); background: transparent;
      font-size: 12px; color: var(--c-muted); cursor: pointer;
      text-decoration: none; transition: all .15s; white-space: nowrap;
      font-family: var(--font-sans);
    }
    .action-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .action-btn:hover { background: var(--c-bg); color: var(--c-text); }
    .action-btn.primary {
      border-color: var(--c-primary); color: var(--c-primary); background: var(--c-primary-light);
    }
    .action-btn.primary:hover { background: var(--c-primary); color: #fff; }

    /* ════════════════════════════════════════════════
       Layout
    ════════════════════════════════════════════════ */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ════════════════════════════════════════════════
       Sidebar
    ════════════════════════════════════════════════ */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      border-right: 1px solid var(--c-border);
      background: var(--c-surface);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width .25s cubic-bezier(.4,0,.2,1), opacity .2s;
    }
    .sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }

    .sidebar-search { padding: 12px 12px 6px; position: relative; flex-shrink: 0; }
    .search-icon {
      position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px; color: var(--c-muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 6px 10px 6px 30px;
      border: 1px solid var(--c-border); border-radius: 8px;
      font-size: 12px; outline: none; background: var(--c-bg); color: var(--c-text);
      transition: border-color .15s, box-shadow .15s; font-family: var(--font-sans);
    }
    .search-input::placeholder { color: #b0b7c3; }
    .search-input:focus {
      border-color: var(--c-primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1); background: #fff;
    }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }
    .nav-section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #9ca3af; padding: 8px 8px 4px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 7px 10px; border-radius: 8px;
      border: none; background: transparent;
      font-size: 13px; color: var(--c-text);
      cursor: pointer; text-align: left;
      transition: background .12s, color .12s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: var(--font-sans);
    }
    .nav-item:hover  { background: var(--c-bg); }
    .nav-item.active { background: var(--c-primary-light); color: var(--c-primary); font-weight: 500; }
    .nav-dot { width: 5px; height: 5px; min-width: 5px; border-radius: 50%; background: currentColor; opacity: .3; }
    .nav-item.active .nav-dot { opacity: 1; }

    .nav-skeleton { display: flex; flex-direction: column; gap: 6px; padding: 4px 6px; }
    .skeleton-item {
      height: 30px; border-radius: 8px;
      background: linear-gradient(90deg, #f0f2f5 25%, #e8eaed 50%, #f0f2f5 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .nav-empty { font-size: 12px; color: var(--c-muted); text-align: center; padding: 24px 10px; }

    .sidebar-footer { border-top: 1px solid var(--c-border); padding: 10px 14px; flex-shrink: 0; }
    .sidebar-footer-inner { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--c-muted); }
    .sidebar-footer-inner code {
      font-family: var(--font-mono); font-size: 10.5px;
      background: var(--c-bg); border: 1px solid var(--c-border);
      border-radius: 4px; padding: 1px 5px; color: var(--c-text);
    }

    /* ════════════════════════════════════════════════
       Content
    ════════════════════════════════════════════════ */
    .content { flex: 1; overflow-y: auto; background: var(--c-bg); }

    #swagger-root { padding: 6px 24px 48px; max-width: 1120px; margin: 0 auto; }

    .content-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; height: 60vh; color: var(--c-muted); text-align: center;
    }
    .content-state svg { width: 40px; height: 40px; }
    .content-state h2 { font-size: 15px; font-weight: 600; color: var(--c-text); }
    .content-state p  { font-size: 13px; max-width: 360px; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--c-border); border-top-color: var(--c-primary);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════════════════════
       Settings Modal
    ════════════════════════════════════════════════ */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }
    .modal-backdrop.open { display: flex; }

    .modal-box {
      width: min(560px, 100%); background: #fff; border-radius: 16px;
      box-shadow: var(--shadow-modal); overflow: hidden;
      animation: modal-in .18s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--c-border); background: #fafafa;
    }
    .modal-header-left {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--c-text);
    }
    .modal-header-left svg { width: 15px; height: 15px; color: var(--c-primary); }

    .modal-body { padding: 20px; max-height: calc(100vh - 200px); overflow-y: auto; }
    .modal-section { margin-bottom: 18px; }
    .modal-section:last-child { margin-bottom: 0; }
    .modal-section-title {
      font-size: 10.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--c-muted); margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .form-grid { display: grid; grid-template-columns: 110px 1fr; gap: 10px 14px; align-items: center; }
    .form-label { font-size: 13px; color: var(--c-text); }
    .form-input {
      width: 100%; padding: 7px 10px;
      border: 1px solid var(--c-border); border-radius: 8px;
      font-size: 13px; outline: none;
      background: var(--c-surface); color: var(--c-text);
      transition: border-color .15s, box-shadow .15s; font-family: var(--font-sans);
    }
    .form-input:focus { border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

    .radio-group { display: flex; gap: 18px; }
    .radio-label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
    .radio-label input[type=radio],
    .radio-label input[type=checkbox] { accent-color: var(--c-primary); width: 14px; height: 14px; cursor: pointer; }

    .divider { height: 1px; background: var(--c-border); margin: 16px 0; }

    /* Toggle */
    .toggle { display: inline-flex; align-items: center; cursor: pointer; position: relative; }
    .toggle input { position: absolute; opacity: 0; width: 0; height: 0; }
    .toggle-track { width: 36px; height: 20px; background: #d1d5db; border-radius: 99px; position: relative; transition: background .2s; }
    .toggle input:checked + .toggle-track { background: var(--c-primary); }
    .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: left .2s; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
    .toggle input:checked + .toggle-track .toggle-thumb { left: 18px; }

    #authFields         { display: none; }
    #authFields.visible { display: contents; }

    .notice {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 12px; color: #92400e;
      background: #fef3c7; border: 1px solid #fde68a;
      border-radius: 8px; padding: 9px 12px; margin-top: 10px;
    }
    .notice svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

    .modal-footer {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; border-top: 1px solid var(--c-border); background: #fafafa;
    }
    .modal-footer-spacer { flex: 1; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 7px 15px; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all .15s; white-space: nowrap;
      font-family: var(--font-sans); border: none;
    }
    .btn-ghost   { border: 1px solid var(--c-border) !important; background: transparent; color: var(--c-text); }
    .btn-ghost:hover { background: var(--c-bg); }
    .btn-danger  { border: 1px solid #fecaca !important; background: transparent; color: var(--c-danger); }
    .btn-danger:hover { background: #fef2f2; }
    .btn-primary { background: var(--c-primary); color: #fff; }
    .btn-primary:hover { background: var(--c-primary-hover); }
    .btn-icon {
      width: 28px; height: 28px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 7px; border: none; background: transparent;
      color: var(--c-muted); cursor: pointer; transition: background .15s;
    }
    .btn-icon:hover { background: var(--c-border); color: var(--c-text); }
    .btn-icon svg { width: 14px; height: 14px; }

    /* ════════════════════════════════════════════════
       Swagger UI Overrides
    ════════════════════════════════════════════════ */
    #swagger-root .swagger-ui .topbar { display: none !important; }
    #swagger-root .swagger-ui .info { margin: 16px 0 10px; }
    #swagger-root .swagger-ui .info h2.title { font-size: 20px; font-weight: 700; color: var(--c-text); font-family: var(--font-sans); }
    #swagger-root .swagger-ui .info .base-url { font-size: 12px; color: var(--c-muted); }
    #swagger-root .swagger-ui .scheme-container { background: transparent; box-shadow: none; padding: 8px 0; border-bottom: 1px solid var(--c-border); }
    #swagger-root .swagger-ui .opblock-tag { border-bottom: 1px solid var(--c-border); font-size: 13.5px; font-weight: 600; color: var(--c-text); padding: 10px 4px; }
    #swagger-root .swagger-ui .opblock-tag:hover { background: var(--c-primary-light); border-radius: var(--radius); }
    #swagger-root .swagger-ui .opblock { border: 1px solid var(--c-border); border-radius: var(--radius); box-shadow: none; margin: 5px 0; overflow: hidden; }
    #swagger-root .swagger-ui .opblock .opblock-summary { border-bottom: none; padding: 9px 14px; cursor: pointer; }
    #swagger-root .swagger-ui .opblock-summary-method { border-radius: 6px; font-size: 11px; font-weight: 700; min-width: 65px; text-align: center; font-family: var(--font-mono); letter-spacing: .02em; padding: 4px 0; }
    /* GET */
    #swagger-root .swagger-ui .opblock.opblock-get    { border-color: #bfdbfe; background: #f0f6ff; }
    #swagger-root .swagger-ui .opblock.opblock-get    .opblock-summary-method { background: #2563eb; }
    /* POST */
    #swagger-root .swagger-ui .opblock.opblock-post   { border-color: #bbf7d0; background: #f0fdf6; }
    #swagger-root .swagger-ui .opblock.opblock-post   .opblock-summary-method { background: #16a34a; }
    /* PUT */
    #swagger-root .swagger-ui .opblock.opblock-put    { border-color: #fed7aa; background: #fffaf5; }
    #swagger-root .swagger-ui .opblock.opblock-put    .opblock-summary-method { background: #d97706; }
    /* DELETE */
    #swagger-root .swagger-ui .opblock.opblock-delete { border-color: #fecaca; background: #fff4f4; }
    #swagger-root .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: #dc2626; }
    /* PATCH */
    #swagger-root .swagger-ui .opblock.opblock-patch  { border-color: #e9d5ff; background: #fbf8ff; }
    #swagger-root .swagger-ui .opblock.opblock-patch  .opblock-summary-method { background: #9333ea; }
    /* HEAD */
    #swagger-root .swagger-ui .opblock.opblock-head   { border-color: #fde68a; background: #fffdf0; }
    #swagger-root .swagger-ui .opblock.opblock-head   .opblock-summary-method { background: #ca8a04; }
    /* OPTIONS */
    #swagger-root .swagger-ui .opblock.opblock-options { border-color: #d4d4d8; background: #fafafa; }
    #swagger-root .swagger-ui .opblock.opblock-options .opblock-summary-method { background: #71717a; }

    #swagger-root .swagger-ui .opblock-summary-path { font-family: var(--font-mono); font-size: 12.5px; font-weight: 500; }
    #swagger-root .swagger-ui .opblock-summary-description { font-size: 12.5px; color: var(--c-muted); }
    #swagger-root .swagger-ui .opblock-body { background: #fff; }

    #swagger-root .swagger-ui table thead tr th { font-size: 12px; font-weight: 600; color: var(--c-muted); border-bottom: 2px solid var(--c-border); padding: 6px 10px; }
    #swagger-root .swagger-ui table tbody tr td { font-size: 13px; padding: 6px 10px; }
    #swagger-root .swagger-ui .response-col_status { font-family: var(--font-mono); font-size: 12px; }

    #swagger-root .swagger-ui section.models { border: 1px solid var(--c-border); border-radius: var(--radius); background: var(--c-surface); margin-top: 16px; }
    #swagger-root .swagger-ui section.models h4 { font-size: 13px; font-weight: 600; }
    #swagger-root .swagger-ui .model-container { background: transparent; }

    #swagger-root .swagger-ui .btn { border-radius: 8px; font-size: 12px; box-shadow: none; font-family: var(--font-sans); }
    #swagger-root .swagger-ui .btn.execute { background: var(--c-primary); border-color: var(--c-primary); }
    #swagger-root .swagger-ui .btn.execute:hover { background: var(--c-primary-hover); }

    #swagger-root .swagger-ui select,
    #swagger-root .swagger-ui input[type=text],
    #swagger-root .swagger-ui input[type=password],
    #swagger-root .swagger-ui textarea {
      border: 1px solid var(--c-border); border-radius: 8px;
      font-size: 13px; background: var(--c-surface); outline: none;
      font-family: var(--font-sans); transition: border-color .15s, box-shadow .15s;
    }
    #swagger-root .swagger-ui select:focus,
    #swagger-root .swagger-ui input[type=text]:focus,
    #swagger-root .swagger-ui textarea:focus {
      border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    #swagger-root .swagger-ui .highlight-code .microlight { font-family: var(--font-mono); font-size: 12px; }
    #swagger-root .swagger-ui pre.microlight { border-radius: 8px; padding: 12px 14px; }

    #swagger-root .swagger-ui .filter-container { margin: 8px 0 4px; }
    #swagger-root .swagger-ui .filter-container .operation-filter-input {
      border: 1px solid var(--c-border); border-radius: 8px;
      font-size: 13px; padding: 7px 12px; width: 100%; font-family: var(--font-sans);
    }

    #swagger-root > .swagger-ui > .wrapper:first-child { padding: 0; }
  </style>
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════ Topbar ═══════════════════════════ -->
  <header class="topbar">
    <div class="topbar-left">

      <button class="sidebar-toggle" id="sidebarToggle" title="切换侧边栏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>

      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <span class="brand-name">SpringDoc <em>Plus</em></span>
      </div>

      <div class="topbar-divider"></div>

      <div class="current-group" id="currentGroupLabel">
        <span class="tag-dot"></span>
        <span id="currentGroupName"></span>
      </div>

    </div>

    <div class="topbar-right">
      <a id="openJsonBtn" href="#" target="_blank" class="action-btn" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        OpenAPI JSON
      </a>

      <button class="action-btn primary" id="settingsBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        配置
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════ Layout ═══════════════════════════ -->
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="searchInput" class="search-input" placeholder="搜索文档组…" autocomplete="off" />
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <div class="nav-section-title">文档组</div>
        <div class="nav-skeleton" id="navSkeleton">
          <div class="skeleton-item" style="width:75%"></div>
          <div class="skeleton-item" style="width:55%"></div>
          <div class="skeleton-item" style="width:85%"></div>
          <div class="skeleton-item" style="width:60%"></div>
        </div>
        <div id="navList"></div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-footer-inner">
          <span>入口保持</span>
          <code>/doc.html</code>
        </div>
      </div>

    </aside>

    <!-- Content -->
    <main class="content">

      <div class="content-state" id="contentLoading">
        <div class="spinner"></div>
        <h2>正在加载…</h2>
        <p>正在获取 API 文档数据</p>
      </div>

      <div class="content-state" id="contentError" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        <h2>加载失败</h2>
        <p id="errorMsg"></p>
      </div>

      <div class="content-state" id="contentEmpty" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <h2>暂无文档</h2>
        <p>当前没有可用的 API 文档组，请确认后端服务是否正常启动</p>
      </div>

      <div id="swagger-root" style="display:none"></div>

    </main>
  </div>
</div>

<!-- ═══════════════════════════ Settings Modal ═══════════════════════════ -->
<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-label="UI 配置">
  <div class="modal-box">

    <div class="modal-header">
      <div class="modal-header-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
        </svg>
        UI 配置
      </div>
      <button class="btn-icon" id="closeModalBtn" title="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">

      <!-- 排序规则 -->
      <div class="modal-section">
        <div class="modal-section-title">排序规则</div>
        <div class="form-grid">
          <label class="form-label">Tags 排序</label>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="tagsSorter" value="alpha" checked /><span>字母序</span></label>
            <label class="radio-label"><input type="radio" name="tagsSorter" value="order" /><span>x-order</span></label>
          </div>
          <label class="form-label">Operations 排序</label>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="operationsSorter" value="alpha" checked /><span>字母序</span></label>
            <label class="radio-label"><input type="radio" name="operationsSorter" value="order" /><span>x-order</span></label>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- 请求鉴权 -->
      <div class="modal-section">
        <div class="modal-section-title">
          <span>请求鉴权</span>
          <label class="toggle" title="启用后将在 Try it out 请求中注入 Header">
            <input type="checkbox" id="authEnabled" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="form-grid" id="authFields">
          <label class="form-label">Header 名称</label>
          <input id="authHeaderName" class="form-input" placeholder="Authorization" />

          <label class="form-label">默认前缀</label>
          <input id="authDefaultPrefix" class="form-input" placeholder="Bearer / Basic / (可空)" />

          <label class="form-label">Token 值</label>
          <input id="authValue" class="form-input" type="password" placeholder="eyJhbGci…" autocomplete="off" />

          <label class="form-label">持久化</label>
          <label class="radio-label">
            <input type="checkbox" id="authPersist" />
            <span style="font-size:12px;color:var(--c-muted)">保存到 localStorage（刷新后保留）</span>
          </label>
        </div>

        <div id="gatewayNotice" class="notice" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
          </svg>
          网关 Basic 认证已开启，访问 UI 可能需要先完成浏览器认证。
        </div>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn btn-danger" id="clearBtn">清空本地配置</button>
      <div class="modal-footer-spacer"></div>
      <button class="btn btn-ghost" id="cancelBtn">取消</button>
      <button class="btn btn-primary" id="applyBtn">应用并刷新</button>
    </div>

  </div>
</div>

<!--
  swagger-ui JS 说明：
  生产与 dev 均通过 /webjars/swagger-ui-dist/ 路径加载，
  Vite dev server 通过 proxy 将该路径转发到 Spring Boot。
-->
<script src="/webjars/swagger-ui-dist/swagger-ui-bundle.js"></script>
<script src="/webjars/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>

<script>
  'use strict';

  /* ════════════════════════════════════════════════
     Config helpers
  ════════════════════════════════════════════════ */
  const LS_KEY = 'springdoc-plus.ui';

  function getLocalConfig() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
    catch { return {}; }
  }
  function setLocalConfig(cfg) {
    localStorage.setItem(LS_KEY, JSON.stringify(cfg || {}));
  }
  function clearLocalConfig() {
    localStorage.removeItem(LS_KEY);
  }
  function mergeConfig(server, local) {
    return Object.assign({}, server || {}, local || {});
  }

  /* ════════════════════════════════════════════════
     Swagger UI helpers
  ════════════════════════════════════════════════ */
  function getXOrder(obj) {
    try {
      if (!obj) return 0;
      if (typeof obj.get === 'function') {
        const v = obj.get('x-order');
        return typeof v === 'number' ? v : parseInt(v || '0', 10);
      }
      const v = obj['x-order'] ?? obj.xOrder ?? obj.x_order;
      return typeof v === 'number' ? v : parseInt(v || '0', 10);
    } catch { return 0; }
  }

  function buildSorters(cfg) {
    const tagsFn = (a, b) => {
      const oa = getXOrder(a), ob = getXOrder(b);
      if (oa !== ob) return oa - ob;
      return String(a?.name ?? a).localeCompare(String(b?.name ?? b));
    };
    const opFn = (a, b) => {
      const opA = a?.get ? a.get('operation') : (a?.operation ?? a);
      const opB = b?.get ? b.get('operation') : (b?.operation ?? b);
      return getXOrder(opA) - getXOrder(opB);
    };
    return {
      tagsSorter:       cfg.tagsSorter       === 'order' ? tagsFn : 'alpha',
      operationsSorter: cfg.operationsSorter === 'order' ? opFn   : 'alpha',
    };
  }

  function buildRequestInterceptor(cfg) {
    return (req) => {
      if (!cfg.authEnabled) return req;
      const headerName = (cfg.authHeaderName || 'Authorization').trim();
      if (!headerName) return req;
      let val = (cfg.authValue || '').trim();
      if (!val) return req;
      const prefix = (cfg.authDefaultPrefix || '').trim();
      if (prefix && !val.startsWith(prefix + ' ')) val = prefix + ' ' + val;
      req.headers[headerName] = val;
      return req;
    };
  }

  function renderSwagger(url, cfg) {
    const root = document.getElementById('swagger-root');
    root.innerHTML = '';
    if (window._swaggerUi) {
      try { window._swaggerUi = null; } catch (_) { /* ignore */ }
    }
    const sorters = buildSorters(cfg);
    window._swaggerUi = SwaggerUIBundle({
      url,
      dom_id: '#swagger-root',
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: 'BaseLayout',
      requestInterceptor: buildRequestInterceptor(cfg),
      tagsSorter:              sorters.tagsSorter,
      operationsSorter:        sorters.operationsSorter,
      docExpansion:            'none',
      defaultModelsExpandDepth: 0,
      filter:                  true,
      tryItOutEnabled:         false,
    });
  }

  /* ════════════════════════════════════════════════
     App State
  ════════════════════════════════════════════════ */
  let groups       = [];
  let serverConfig = {};
  let mergedConfig = {};
  let activeGroup  = null;
  let sidebarCollapsed = false;

  /* ════════════════════════════════════════════════
     UI helpers
  ════════════════════════════════════════════════ */
  function showState(id) {
    ['contentLoading', 'contentError', 'contentEmpty', 'swagger-root'].forEach(s => {
      const el = document.getElementById(s);
      if (!el) return;
      el.style.display = s === id
        ? (s === 'swagger-root' ? 'block' : 'flex')
        : 'none';
    });
  }

  function toggleSidebar() {
    sidebarCollapsed = !sidebarCollapsed;
    document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderNavList(keyword) {
    const kw = (keyword || '').trim().toLowerCase();
    const filtered = kw ? groups.filter(g => g.name.toLowerCase().includes(kw)) : groups;
    const nav = document.getElementById('navList');

    if (!filtered.length) {
      nav.innerHTML = '<div class="nav-empty">无匹配文档组</div>';
      return;
    }

    nav.innerHTML = filtered.map(g => `
      <button
        class="nav-item${activeGroup?.url === g.url ? ' active' : ''}"
        data-url="${esc(g.url)}"
        data-name="${esc(g.name)}"
        title="${esc(g.name)}"
      ><span class="nav-dot"></span>${esc(g.name)}</button>
    `).join('');

    nav.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => selectGroup(btn.dataset.url, btn.dataset.name));
    });
  }

  function selectGroup(url, name) {
    activeGroup = { url, name };

    // 顶栏更新
    const label = document.getElementById('currentGroupLabel');
    label.style.display = 'flex';
    document.getElementById('currentGroupName').textContent = name;

    const jsonBtn = document.getElementById('openJsonBtn');
    jsonBtn.style.display = '';
    jsonBtn.href = url;

    // 刷新导航高亮
    renderNavList(document.getElementById('searchInput').value);

    // 渲染 Swagger
    showState('swagger-root');
    renderSwagger(url, mergedConfig);
  }

  /* ════════════════════════════════════════════════
     Settings Modal
  ════════════════════════════════════════════════ */
  function openModal() {
    const cfg = mergeConfig(serverConfig, getLocalConfig());

    document.querySelectorAll('[name=tagsSorter]').forEach(r => {
      r.checked = r.value === (cfg.tagsSorter || 'alpha');
    });
    document.querySelectorAll('[name=operationsSorter]').forEach(r => {
      r.checked = r.value === (cfg.operationsSorter || 'alpha');
    });

    const authEnabled = !!cfg.authEnabled;
    document.getElementById('authEnabled').checked          = authEnabled;
    document.getElementById('authHeaderName').value         = cfg.authHeaderName    || 'Authorization';
    document.getElementById('authDefaultPrefix').value      = cfg.authDefaultPrefix || '';
    document.getElementById('authValue').value              = cfg.authValue         || '';
    document.getElementById('authPersist').checked          = !!cfg.authPersist;
    document.getElementById('authFields').classList.toggle('visible', authEnabled);
    document.getElementById('gatewayNotice').style.display  = cfg.gatewayBasicEnabled ? 'flex' : 'none';

    document.getElementById('modalBackdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
  }

  function collectModal() {
    return {
      tagsSorter:        document.querySelector('[name=tagsSorter]:checked')?.value       || 'alpha',
      operationsSorter:  document.querySelector('[name=operationsSorter]:checked')?.value || 'alpha',
      authEnabled:       document.getElementById('authEnabled').checked,
      authHeaderName:    document.getElementById('authHeaderName').value,
      authDefaultPrefix: document.getElementById('authDefaultPrefix').value,
      authValue:         document.getElementById('authValue').value,
      authPersist:       document.getElementById('authPersist').checked,
    };
  }

  /* ════════════════════════════════════════════════
     Bootstrap
  ════════════════════════════════════════════════ */
  (async () => {

    /* 事件绑定 */
    document.getElementById('sidebarToggle')
      .addEventListener('click', toggleSidebar);

    document.getElementById('settingsBtn')
      .addEventListener('click', openModal);

    document.getElementById('closeModalBtn')
      .addEventListener('click', closeModal);

    document.getElementById('cancelBtn')
      .addEventListener('click', closeModal);

    document.getElementById('modalBackdrop')
      .addEventListener('click', e => { if (e.target.id === 'modalBackdrop') closeModal(); });

    document.getElementById('searchInput')
      .addEventListener('input', e => renderNavList(e.target.value));

    document.getElementById('authEnabled')
      .addEventListener('change', e => {
        document.getElementById('authFields').classList.toggle('visible', e.target.checked);
      });

    document.getElementById('clearBtn').addEventListener('click', () => {
      clearLocalConfig();
      mergedConfig = mergeConfig(serverConfig, {});
      document.querySelectorAll('[name=tagsSorter]').forEach(r => r.checked = r.value === 'alpha');
      document.querySelectorAll('[name=operationsSorter]').forEach(r => r.checked = r.value === 'alpha');
      document.getElementById('authEnabled').checked          = false;
      document.getElementById('authFields').classList.remove('visible');
      document.getElementById('authHeaderName').value         = 'Authorization';
      document.getElementById('authDefaultPrefix').value      = '';
      document.getElementById('authValue').value              = '';
      document.getElementById('authPersist').checked          = false;
    });

    document.getElementById('applyBtn').addEventListener('click', () => {
      const local = collectModal();
      if (local.authPersist) {
        setLocalConfig(local);
      } else {
        const { authValue, ...rest } = local;
        setLocalConfig(rest);
      }
      mergedConfig = mergeConfig(serverConfig, getLocalConfig());
      closeModal();
      if (activeGroup) renderSwagger(activeGroup.url, mergedConfig);
    });

    /* 数据加载 */
    showState('contentLoading');

    try {
      const [groupsRes, uiCfgRes] = await Promise.all([
        fetch('/springdoc-plus-gateway/openapi/groups'),
        fetch('/springdoc-plus-gateway/ui-config').catch(() => null),
      ]);

      if (!groupsRes.ok) {
        throw new Error(
          `加载文档组失败 (HTTP ${groupsRes.status})` +
          (groupsRes.status === 404 ? '，请确认 /springdoc-plus-gateway/openapi/groups 接口已注册' : '，请确认后端服务已启动')
        );
      }

      const groupsData = await groupsRes.json();
      groups = groupsData.groups || [];

      if (uiCfgRes && uiCfgRes.ok) {
        serverConfig = await uiCfgRes.json();
      }

      /* 合并配置：服务端默认值 < 用户本地覆盖 */
      const localCfg = getLocalConfig();
      mergedConfig = mergeConfig(serverConfig, localCfg);
      /* 非持久化时不恢复 token */
      if (!mergedConfig.authPersist) mergedConfig.authValue = '';

      document.getElementById('navSkeleton').style.display = 'none';

      if (!groups.length) {
        showState('contentEmpty');
        renderNavList('');
        return;
      }

      renderNavList('');
      selectGroup(groups[0].url, groups[0].name);

    } catch (err) {
      showState('contentError');
      document.getElementById('errorMsg').textContent = err?.message ?? String(err);
      document.getElementById('navSkeleton').style.display = 'none';
    }
  })();
</script>

</body>
</html>
