<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>springdoc-plus - API 文档</title>
  <link rel="stylesheet" href="/webjars/swagger-ui-dist/swagger-ui.css" />
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --danger: #b91c1c;
    }
    body { margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial; background: var(--bg); color: var(--fg); }
    .topbar { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .brand { font-weight:800; letter-spacing: .2px; }
    .select, .input, .btn { padding:6px 10px; border:1px solid var(--border); border-radius:8px; background:#fff; }
    .btn { cursor:pointer; }
    .btn.primary { border-color: var(--primary); color: var(--primary); }
    .btn.danger { border-color: var(--danger); color: var(--danger); }
    .hint { color:var(--muted); font-size:12px; }
    #swagger-ui { padding: 0 12px; }

    /* Modal */
    .modal-backdrop { position: fixed; inset:0; background: rgba(0,0,0,.35); display:none; align-items:center; justify-content:center; z-index: 100; }
    .modal { width: min(720px, calc(100vw - 24px)); background:#fff; border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,.25); border: 1px solid var(--border); }
    .modal-header { padding: 12px 14px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .modal-title { font-weight: 800; }
    .modal-body { padding: 14px; }
    .grid { display:grid; grid-template-columns: 180px 1fr; gap: 10px 12px; align-items:center; }
    .label { color: var(--muted); font-size: 13px; }
    .row { display:flex; gap: 10px; align-items:center; }
    .modal-footer { padding: 12px 14px; border-top: 1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
    .small { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">springdoc-plus</div>
    <select id="groupSelect" class="select"></select>
    <div class="hint">入口保持 <b>/doc.html</b></div>
    <div style="flex:1"></div>
    <button id="settingsBtn" class="btn primary">配置</button>
  </div>

  <div id="swagger-ui"></div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">Knife4j4 UI 配置</div>
        <button id="closeModalBtn" class="btn">关闭</button>
      </div>
      <div class="modal-body">
        <div class="grid">
          <div class="label">Tags 排序</div>
          <div class="row">
            <select id="tagsSorter" class="select">
              <option value="alpha">alpha（默认）</option>
              <option value="order">order（按 x-order）</option>
            </select>
            <div class="small">对齐 Knife4j 4.2+：alpha / order</div>
          </div>

          <div class="label">Operations 排序</div>
          <div class="row">
            <select id="operationsSorter" class="select">
              <option value="alpha">alpha（默认）</option>
              <option value="order">order（按 x-order）</option>
            </select>
          </div>

          <div class="label">鉴权开关</div>
          <div class="row">
            <label class="small"><input id="authEnabled" type="checkbox" /> 启用</label>
            <div class="small">仅影响 UI 的 Try it out 请求头注入</div>
          </div>

          <div class="label">Header 名</div>
          <input id="authHeaderName" class="input" placeholder="Authorization / X-Token / ..." />

          <div class="label">默认前缀</div>
          <input id="authDefaultPrefix" class="input" placeholder="Bearer / Basic / (可空)" />

          <div class="label">Header 值</div>
          <input id="authValue" class="input" placeholder="例如：Bearer eyJ... 或 Basic base64..." />

          <div class="label">记住我</div>
          <label class="small"><input id="authPersist" type="checkbox" /> localStorage 持久化</label>

          <div class="label">网关 Basic</div>
          <div class="small" id="gatewayBasicHint">—</div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="clearBtn" class="btn danger">清空本地配置</button>
        <button id="applyBtn" class="btn primary">应用并刷新</button>
      </div>
    </div>
  </div>

  <script src="/webjars/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script src="/webjars/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>
  <script>
    const LS_KEY = 'springdoc-plus.ui';

    async function loadGroups() {
      const res = await fetch('/springdoc-plus-gateway/openapi/groups');
      if (!res.ok) throw new Error('Failed to load groups: ' + res.status);
      const data = await res.json();
      return data.groups || [];
    }

    async function loadServerUiConfig() {
      const res = await fetch('/springdoc-plus-gateway/ui-config');
      if (!res.ok) throw new Error('Failed to load ui-config: ' + res.status);
      return await res.json();
    }

    function getLocalConfig() {
      try {
        return JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      } catch (e) {
        return {};
      }
    }

    function setLocalConfig(cfg) {
      localStorage.setItem(LS_KEY, JSON.stringify(cfg || {}));
    }

    function clearLocalConfig() {
      localStorage.removeItem(LS_KEY);
    }

    function mergeConfig(serverCfg, localCfg) {
      return Object.assign({}, serverCfg || {}, localCfg || {});
    }

    function getXOrder(obj) {
      try {
        if (obj == null) return 0;
        if (typeof obj.get === 'function') {
          const v = obj.get('x-order');
          return typeof v === 'number' ? v : parseInt(v || '0', 10);
        }
        const v = obj['x-order'] ?? obj.xOrder ?? obj.x_order;
        return typeof v === 'number' ? v : parseInt(v || '0', 10);
      } catch (e) {
        return 0;
      }
    }

    function buildSorters(cfg) {
      const tagsSorter = cfg.tagsSorter;
      const operationsSorter = cfg.operationsSorter;

      const tagsSorterFn = (a, b) => {
        const oa = getXOrder(a);
        const ob = getXOrder(b);
        if (oa !== ob) return oa - ob;
        // fallback alpha
        const sa = (a && (a.name || a)) + '';
        const sb = (b && (b.name || b)) + '';
        return sa.localeCompare(sb);
      };

      const operationsSorterFn = (a, b) => {
        // swagger-ui 不同版本参数形态不同：尽量兼容
        const opA = a && (a.get ? a.get('operation') : a.operation) ? (a.get ? a.get('operation') : a.operation) : a;
        const opB = b && (b.get ? b.get('operation') : b.operation) ? (b.get ? b.get('operation') : b.operation) : b;
        const oa = getXOrder(opA);
        const ob = getXOrder(opB);
        if (oa !== ob) return oa - ob;
        return 0;
      };

      return {
        tagsSorter: tagsSorter === 'order' ? tagsSorterFn : 'alpha',
        operationsSorter: operationsSorter === 'order' ? operationsSorterFn : 'alpha'
      };
    }

    function buildRequestInterceptor(cfg) {
      return (req) => {
        if (!cfg.authEnabled) return req;

        const headerName = (cfg.authHeaderName || 'Authorization').trim();
        if (!headerName) return req;

        let val = (cfg.authValue || '').trim();
        if (!val) return req;

        const prefix = (cfg.authDefaultPrefix || '').trim();
        if (prefix && !val.startsWith(prefix + ' ')) {
          val = prefix + ' ' + val;
        }

        req.headers[headerName] = val;
        return req;
      };
    }

    function renderSwagger(url, cfg) {
      document.getElementById('swagger-ui').innerHTML = '';
      const sorters = buildSorters(cfg);
      window.ui = SwaggerUIBundle({
        url,
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: 'BaseLayout',
        requestInterceptor: buildRequestInterceptor(cfg),
        tagsSorter: sorters.tagsSorter,
        operationsSorter: sorters.operationsSorter
      });
    }

    function openModal() {
      document.getElementById('modalBackdrop').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modalBackdrop').style.display = 'none';
    }

    function bindModal(cfg) {
      document.getElementById('tagsSorter').value = cfg.tagsSorter || 'alpha';
      document.getElementById('operationsSorter').value = cfg.operationsSorter || 'alpha';
      document.getElementById('authEnabled').checked = !!cfg.authEnabled;
      document.getElementById('authHeaderName').value = cfg.authHeaderName || 'Authorization';
      document.getElementById('authDefaultPrefix').value = cfg.authDefaultPrefix || '';
      document.getElementById('authValue').value = cfg.authValue || '';
      document.getElementById('authPersist').checked = !!cfg.authPersist;

      const basicHint = document.getElementById('gatewayBasicHint');
      basicHint.textContent = cfg.gatewayBasicEnabled ? '已开启（访问 UI 可能需要 Basic 认证）' : '未开启';
    }

    function collectModal() {
      return {
        tagsSorter: document.getElementById('tagsSorter').value,
        operationsSorter: document.getElementById('operationsSorter').value,
        authEnabled: document.getElementById('authEnabled').checked,
        authHeaderName: document.getElementById('authHeaderName').value,
        authDefaultPrefix: document.getElementById('authDefaultPrefix').value,
        authValue: document.getElementById('authValue').value,
        authPersist: document.getElementById('authPersist').checked
      };
    }

    (async () => {
      try {
        const [groups, serverCfg] = await Promise.all([loadGroups(), loadServerUiConfig()]);
        const select = document.getElementById('groupSelect');

        if (!groups.length) {
          select.innerHTML = '<option>暂无可用文档</option>';
          return;
        }

        // init config
        const localCfg = getLocalConfig();
        let cfg = mergeConfig(serverCfg, localCfg);

        // if server sets persist=false then avoid loading cached authValue
        if (!cfg.authPersist) {
          cfg.authValue = '';
        }

        // modal
        document.getElementById('settingsBtn').addEventListener('click', () => {
          cfg = mergeConfig(serverCfg, getLocalConfig());
          bindModal(cfg);
          openModal();
        });
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('modalBackdrop').addEventListener('click', (e) => {
          if (e.target && e.target.id === 'modalBackdrop') closeModal();
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
          clearLocalConfig();
          cfg = mergeConfig(serverCfg, {});
          bindModal(cfg);
        });
        document.getElementById('applyBtn').addEventListener('click', () => {
          const newCfg = collectModal();
          // persist logic
          if (newCfg.authPersist) {
            setLocalConfig(newCfg);
          } else {
            // keep non-sensitive settings, drop authValue
            const { authValue, ...rest } = newCfg;
            setLocalConfig(rest);
          }
          cfg = mergeConfig(serverCfg, getLocalConfig());
          closeModal();
          renderSwagger(select.value, cfg);
        });

        // group select
        select.innerHTML = groups.map(g => `<option value="${g.url}">${g.name}</option>`).join('');
        select.addEventListener('change', (e) => renderSwagger(e.target.value, cfg));

        // initial render
        renderSwagger(groups[0].url, cfg);
      } catch (e) {
        document.getElementById('groupSelect').innerHTML = '<option>加载失败</option>';
        document.getElementById('swagger-ui').innerHTML = '<pre style="color:#c00">' + (e && e.stack ? e.stack : e) + '</pre>';
      }
    })();
  </script>
</body>
</html>
